global:
  scrape_interval: 10s

scrape_configs:
  - job_name: 'on-chain-metrics'
    metrics_path: /on-chain-metrics
    scrape_interval: 2s
    static_configs:
      - targets: [ 'host.docker.internal:9112', '172.17.0.1:9112']
  - job_name: 'otel-collector'
    scrape_interval: 10s
    static_configs:
      - targets: [ 'otel-collector:8889' ]
  - job_name: 'ctf'
    metrics_path: /metrics
    docker_sd_configs:
      - host: 'unix:///var/run/docker.sock'
        refresh_interval: 20s
    relabel_configs:
      # Drop containers with no exposed ports
      - source_labels: [__meta_docker_port_private]
        regex: '.+'
        action: keep
      # Use container name (strip leading /) as the job label
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: job
        replacement: '$1'
      # Build address from container name + private port
      - source_labels: [__meta_docker_container_name, __meta_docker_port_private]
        regex: '/(.+);(.+)'
        target_label: __address__
        replacement: '$1:$2'
  - job_name: cadvisor
    scrape_interval: 10s
    static_configs:
      - targets:
          - cadvisor:8080
  - job_name: 'postgres_exporter_0'
    static_configs:
      - targets: ['postgres_exporter_0:9187']
  - job_name: 'postgres_exporter_1'
    static_configs:
      - targets: ['postgres_exporter_1:9187']
  - job_name: 'postgres_exporter_2'
    static_configs:
      - targets: ['postgres_exporter_2:9187']
  - job_name: 'postgres_exporter_3'
    static_configs:
      - targets: ['postgres_exporter_3:9187']
  - job_name: 'postgres_exporter_4'
    static_configs:
      - targets: ['postgres_exporter_4:9187']
