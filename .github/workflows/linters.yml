name: Run all linters
on: [ push ]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    strategy:
      fail-fast: false
      matrix:
        dir:
          - framework
          - parrot
          - wasp
          - seth
          - k8s-test-runner
          - lib
          - tools/workflowresultparser
          - tools/asciitable
          - tools/ghlatestreleasechecker
          - tools/testlistgenerator
          - tools/ecrimagefetcher
          - tools/gotestloghelper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Devbox
        uses: jetify-com/devbox-install-action@734088efddca47cf44ff8a09289c6d0e51b73218 # v0.12.0
        with:
          enable-cache: 'true'
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.dir }}/go.mod
      - name: Install framework golangci-lint with module Go version
        if: matrix.dir == 'framework'
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          GOBIN="$RUNNER_TEMP/bin" go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.5
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2.0.0
        with:
          just-version: '1.39.0'
      - name: Lint
        if: matrix.dir == 'framework'
        env:
          GOLANGCI_LINT_BIN: ${{ runner.temp }}/bin/golangci-lint
        run: |
          devbox run -- just lint ${{ matrix.dir }}
      - name: Lint
        if: matrix.dir != 'framework'
        run: |
          devbox run -- just lint ${{ matrix.dir }}
