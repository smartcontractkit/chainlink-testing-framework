name: Module graph
on:
  pull_request:
jobs:
  modgraph:
    runs-on: ubuntu-latest
    name: modgraph
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Go
        uses: actions/setup-go@v5
      - run: make modgraph
      - name: Ensure clean modgraph
        run: git diff --minimal --exit-code
